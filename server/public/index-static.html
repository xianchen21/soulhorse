<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, viewport-fit=cover">
  <title>一百种有趣的灵魂 - 马匹百科</title>
  <style>
    :root {
      --primary: #2563EB;
      --secondary: #F59E0B;
      --danger: #EF4444;
      --bg: #f5f5f5;
      --text: #333;
      --text-light: #666;
      --white: #fff;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #app { height: 100%; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); }
    .page { min-height: 100%; padding-bottom: 56px; }
    .nav-bar { background: var(--primary); color: white; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    .nav-bar h1 { font-size: 18px; font-weight: 600; }
    .nav-bar .right-actions { display: flex; gap: 12px; }
    .nav-bar .search-box { flex: 1; margin: 0 16px; background: rgba(255,255,255,0.2); padding: 8px 12px; border-radius: 20px; display: flex; align-items: center; gap: 8px; }
    .nav-bar .search-box input { background: transparent; border: none; color: white; outline: none; width: 100%; }
    .nav-bar .search-box input::placeholder { color: rgba(255,255,255,0.7); }

    .banners-container { display: flex; padding: 12px; flex-wrap: nowrap; }
    .banner-item { flex: 1; cursor: pointer; min-width: 0; }
    .banner-item img { width: 100%; height: 120px; object-fit: contain; border-radius: 4px; }

    .quick-entry { background: white; padding: 16px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
    .entry-item { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .entry-item img { width: 48px; height: 48px; border-radius: 12px; object-fit: cover; }
    .entry-item span { font-size: 12px; color: var(--text-light); }

    .section-title { padding: 16px; font-size: 18px; font-weight: 600; background: var(--bg); }
    .content-list { padding: 0 12px; display: flex; flex-direction: column; gap: 12px; }
    .content-card { background: white; border-radius: 8px; display: flex; gap: 12px; padding: 12px; }
    .content-card img { width: 100px; height: 80px; border-radius: 6px; object-fit: cover; flex-shrink: 0; }
    .content-card .info { flex: 1; display: flex; flex-direction: column; justify-content: space-between; min-width: 0; }
    .content-card .title { font-size: 15px; font-weight: 500; color: var(--text); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .content-card .summary { font-size: 13px; color: var(--text-light); margin-top: 4px; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
    .content-card .meta { display: flex; gap: 16px; font-size: 12px; color: var(--text-light); margin-top: 6px; }

    .loading { text-align: center; padding: 40px; color: var(--text-light); }
    .empty { text-align: center; padding: 40px; color: var(--text-light); }

    .tab-bar { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; justify-content: space-around; padding: 8px 0; border-top: 1px solid #eee; }
    .tab-item { display: flex; flex-direction: column; align-items: center; gap: 2px; color: var(--text-light); }
    .tab-item.active { color: var(--primary); }
    .tab-item span:first-child { font-size: 20px; }
    .tab-item span:last-child { font-size: 11px; }

    .search-page { padding: 16px; }
    .search-input { width: 100%; padding: 12px 16px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; outline: none; }
    .search-results { margin-top: 16px; }
    .search-item { background: white; padding: 12px; border-radius: 8px; margin-bottom: 8px; }
    .search-item .title { font-size: 15px; font-weight: 500; }
    .search-item .summary { font-size: 13px; color: var(--text-light); margin-top: 4px; }

    .category-page { padding: 16px; }
    .cat-list { display: flex; flex-wrap: wrap; gap: 12px; }
    .cat-item { background: white; padding: 12px 20px; border-radius: 20px; font-size: 14px; }

    .detail-page { padding: 16px; }
    .detail-title { font-size: 20px; font-weight: 600; margin-bottom: 12px; }
    .detail-meta { font-size: 13px; color: var(--text-light); margin-bottom: 16px; }
    .detail-cover { width: 100%; border-radius: 8px; margin-bottom: 16px; }
    .detail-content { background: white; padding: 16px; border-radius: 8px; }
    .detail-content img { max-width: 100%; height: auto; border-radius: 8px; margin: 8px 0; }
    .detail-content h2 { font-size: 18px; margin: 16px 0 8px; color: var(--primary); }
    .detail-content h3 { font-size: 16px; margin: 12px 0 6px; }
    .detail-content p { font-size: 14px; line-height: 1.8; margin-bottom: 8px; color: var(--text); }
    .detail-content strong { color: var(--primary); }
    .detail-content ul { margin-left: 20px; }
    .detail-content li { font-size: 14px; line-height: 1.8; margin-bottom: 4px; }

    .back-btn { position: fixed; top: 12px; left: 16px; z-index: 101; width: 36px; height: 36px; background: rgba(0,0,0,0.5); color: white; border: none; border-radius: 50%; font-size: 18px; display: flex; align-items: center; justify-content: center; }

    .profile-header { background: linear-gradient(135deg, var(--primary), #1d4ed8); padding: 32px 16px; color: white; }
    .profile-header .user { display: flex; align-items: center; gap: 12px; }
    .profile-header .avatar { width: 64px; height: 64px; background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 32px; }
    .profile-header .login-btn { margin-top: 16px; background: rgba(255,255,255,0.2); padding: 10px; border-radius: 8px; text-align: center; }

    .menu-list { margin: 12px; background: white; border-radius: 8px; overflow: hidden; }
    .menu-item { display: flex; align-items: center; justify-content: space-between; padding: 16px; border-bottom: 1px solid #f0f0f0; }
    .menu-item:last-child { border-bottom: none; }
    .menu-item .left { display: flex; align-items: center; gap: 12px; }
    .menu-item .icon { font-size: 20px; }

    .footer { text-align: center; padding: 20px; color: var(--text-light); font-size: 12px; }

    .gallery-main { width: 100%; max-height: 400px; object-fit: contain; border-radius: 8px; }
    .gallery-nav { display: flex; justify-content: center; gap: 20px; margin-top: 12px; }
    .gallery-btn { width: 40px; height: 40px; border: none; border-radius: 50%; background: white; font-size: 18px; }
    .gallery-count { line-height: 40px; color: var(--text-light); }
    .gallery-thumbnails { display: flex; gap: 6px; margin-top: 12px; overflow-x: auto; padding-bottom: 8px; }
    .thumbnail { width: 60px; height: 60px; border-radius: 4px; object-fit: cover; opacity: 0.5; }
    .thumbnail.active { opacity: 1; border: 2px solid var(--primary); }

    .horse-list { padding: 12px; }
    .horse-item { background: white; padding: 16px; border-radius: 8px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; }
    .horse-icon { font-size: 28px; }
    .horse-name { font-size: 16px; font-weight: 500; }
    .horse-detail { padding: 16px; }
    .horse-info { margin-top: 16px; background: white; padding: 16px; border-radius: 8px; }
    .horse-title { font-size: 20px; font-weight: 600; margin-bottom: 12px; }
    .horse-body { font-size: 14px; line-height: 1.8; }
    .horse-body h2 { font-size: 18px; margin: 16px 0 8px; color: var(--primary); }
    .horse-body h3 { font-size: 16px; margin: 12px 0 6px; }
    .horse-body p { margin-bottom: 8px; }
    .horse-body strong { color: var(--primary); }
  </style>
</head>
<body>
  <div id="app">
    <div v-if="currentPage === 'home'" class="page">
      <div class="nav-bar">
        <h1>一百种有趣的灵魂</h1>
        <div class="right-actions">
          <span>🔍</span>
        </div>
      </div>
      <div class="banners-container">
        <div v-for="banner in banners" :key="banner.id" class="banner-item" @click="goDetail(banner.link_url)">
          <img :src="banner.image" alt="banner">
        </div>
      </div>
      <div class="quick-entry">
        <div class="entry-item" @click="goPage('category')">
          <img src="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%232563EB' stroke-width='2'><path d='M4 6h16M4 12h16M4 18h16'/></svg>" alt="分类">
          <span>马种介绍</span>
        </div>
        <div class="entry-item">
          <img src="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23F59E0B' stroke-width='2'><path d='M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4'/></svg>" alt="养护">
          <span>养护知识</span>
        </div>
        <div class="entry-item">
          <img src="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2310B981' stroke-width='2'><path d='M13 2L3 14h9l-1 8 10-12h-9l1-8z'/></svg>" alt="训练">
          <span>训练技巧</span>
        </div>
        <div class="entry-item">
          <img src="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23EF4444' stroke-width='2'><circle cx='12' cy='12' r='10'/><polyline points='12 6 12 12 16 14'/></svg>" alt="赛事">
          <span>赛事资讯</span>
        </div>
      </div>
      <div class="section-title">🐴 马种介绍</div>
      <div class="content-list">
        <div v-for="item in contents" :key="item.id" class="content-card" @click="goDetail('/detail/' + item.id)">
          <img :src="item.cover" alt="cover">
          <div class="info">
            <div class="title">{{ item.title }}</div>
            <div class="summary">{{ item.summary }}</div>
            <div class="meta">
              <span>👁️ {{ item.view_count }}</span>
              <span>📅 {{ item.publish_time }}</span>
            </div>
          </div>
        </div>
      </div>
      <div class="footer">copyright Koda&Fiona</div>
      <div class="tab-bar">
        <div class="tab-item active" @click="goPage('home')"><span>🏠</span><span>首页</span></div>
        <div class="tab-item" @click="goPage('category')"><span>📚</span><span>分类</span></div>
        <div class="tab-item" @click="goPage('profile')"><span>👤</span><span>我的</span></div>
      </div>
    </div>

    <div v-else-if="currentPage === 'category'" class="page">
      <div class="nav-bar">
        <button class="back-btn" @click="goPage('home')">←</button>
        <h1>马种介绍</h1>
        <span style="width:36px;"></span>
      </div>
      <div v-if="!selectedHorse" class="horse-list">
        <div v-for="horse in horseList" :key="horse.id" class="horse-item" @click="selectHorse(horse)">
          <span class="horse-icon">🐴</span>
          <span class="horse-name">{{ horse.title }}</span>
        </div>
      </div>
      <div v-else class="horse-detail">
        <button class="back-btn" @click="selectedHorse = null">←</button>
        <div v-if="selectedHorse.images && selectedHorse.images.length" class="image-gallery">
          <img :src="selectedHorse.images[currentImageIndex]" class="gallery-main" alt="马的图片">
          <div class="gallery-nav
